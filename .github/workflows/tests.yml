name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Make scripts executable
      run: |
        chmod +x fetch-github-history
        chmod +x fetch-gitlab-history
        chmod +x fetch-jira-history
        chmod +x fetch-history
        chmod +x generate-history-draft
        chmod +x setup-project
        chmod +x run_tests.py

    - name: Run tests
      run: |
        python run_tests.py --verbose

    - name: Test script syntax
      run: |
        python -m py_compile fetch-github-history
        python -m py_compile fetch-gitlab-history
        python -m py_compile fetch-jira-history
        python -m py_compile fetch-history
        python -m py_compile generate-history-draft
        python -m py_compile setup-project

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Check Python syntax
      run: |
        python -m py_compile fetch-github-history
        python -m py_compile fetch-gitlab-history
        python -m py_compile fetch-jira-history
        python -m py_compile fetch-history
        python -m py_compile generate-history-draft
        python -m py_compile setup-project
        python -m py_compile run_tests.py

    - name: Verify executables have shebang
      run: |
        for script in fetch-github-history fetch-gitlab-history fetch-jira-history fetch-history generate-history-draft setup-project run_tests.py; do
          if ! head -n1 "$script" | grep -q "^#!/usr/bin/env python3"; then
            echo "ERROR: $script missing proper shebang"
            exit 1
          fi
        done

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Initialize git repository
      run: |
        git config --global user.email "test@example.com"
        git config --global user.name "Test User"
        git init test-repo
        cd test-repo
        echo "# Test" > README.md
        git add README.md
        git commit -m "Initial commit"

    - name: Test setup-project (dry-run simulation)
      run: |
        cd test-repo
        # Create a mock config to test validation
        cat > .project-history-config.json << EOF
        {
          "platforms": {
            "github": {
              "enabled": true,
              "owner": "test",
              "repo": "repo"
            },
            "gitlab": {"enabled": false},
            "jira": {"enabled": false}
          },
          "output_dir": "./history"
        }
        EOF

        # Verify config is valid JSON
        python -c "import json; json.load(open('.project-history-config.json'))"

    - name: Test fetch scripts help output
      run: |
        ./fetch-github-history --help
        ./fetch-gitlab-history --help
        ./fetch-jira-history --help
        ./fetch-history --help
        ./generate-history-draft --help
